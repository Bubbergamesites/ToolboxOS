<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SketchPad Pro + Export</title>
    <style>
        body {
            background-color: #2c3e50;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .toolbar {
            background: #34495e;
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            color: white;
            z-index: 10;
        }

        canvas {
            background-color: white;
            margin-top: 20px;
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
            touch-action: none;
        }

        .tool-group { display: flex; align-items: center; gap: 8px; font-size: 14px; }

        button {
            padding: 8px 12px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #ecf0f1;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background: #bdc3c7; }
        .btn-download { background: #3498db; color: white; }
        .btn-download:hover { background: #2980b9; }
        .btn-save { background: #27ae60; color: white; }
        .btn-clear { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="tool-group">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#000000">
        </div>
        <div class="tool-group">
            <label>Size</label>
            <input type="range" id="sizePicker" min="1" max="40" value="5">
        </div>
        <button onclick="clearCanvas()" class="btn-clear">Clear</button>
        <button onclick="saveToLocal()" class="btn-save">Save (Browser)</button>
        <button onclick="downloadImage()" class="btn-download">Download .PNG</button>
    </div>

    <canvas id="paintCanvas"></canvas>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizePicker = document.getElementById('sizePicker');

        // Dynamic resizing
        function resizeCanvas() {
            canvas.width = window.innerWidth * 0.9;
            canvas.height = window.innerHeight * 0.75;
            // Re-draw background white (essential for JPG/PNG exports)
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Reload saved data if it exists
            const saved = localStorage.getItem('savedDrawing');
            if (saved) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = saved;
            }
        }

        window.addEventListener('resize', resizeCanvas);
        window.onload = resizeCanvas;

        let painting = false;

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
            const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;

            ctx.lineWidth = sizePicker.value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = colorPicker.value;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Mouse Events
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);

        // Touch Events
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', finishedPosition);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

        function clearCanvas() {
            if(confirm("Discard this drawing?")) {
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                localStorage.removeItem('savedDrawing');
            }
        }

        function saveToLocal() {
            localStorage.setItem('savedDrawing', canvas.toDataURL());
            alert("Drawing cached in browser storage.");
        }

        // NEW: Download Function
        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'my-doodle.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
    </script>
</body>
</html>
